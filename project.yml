name: nextNote
options:
  bundleIdPrefix: com.nextnote
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: ""

packages:
  # Remote MLX packages inherited from PureText (local LLM + tokenizers + HF API).
  mlx-swift-lm:
    url: https://github.com/DePasqualeOrg/mlx-swift-lm
    branch: swift-tokenizers
  swift-tokenizers-mlx:
    url: https://github.com/DePasqualeOrg/swift-tokenizers-mlx
    branch: main
  swift-hf-api-mlx:
    url: https://github.com/DePasqualeOrg/swift-hf-api-mlx
    branch: main
  # EPUB reader + importer.
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: "0.9.19"
  SwiftSoup:
    url: https://github.com/scinfu/SwiftSoup
    from: "2.7.0"
  # Embedded terminal pane — Phase B AI workflow CLI integration.
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

targets:
  nextNote:
    type: application
    platform: macOS
    sources:
      - path: nextNote
        excludes:
          - "**/.DS_Store"
          - "Resources/vault-template"
      # Treat vault-template as a single folder reference so the whole
      # directory tree is copied into the .app bundle as Resources/vault-template/,
      # preserving nested paths (skills, templates, memory/, etc.).
      - path: nextNote/Resources/vault-template
        type: folder
        buildPhase: resources
    dependencies:
      - package: mlx-swift-lm
        product: MLXLLM
      - package: mlx-swift-lm
        product: MLXVLM
      - package: mlx-swift-lm
        product: MLXLMCommon
      - package: swift-tokenizers-mlx
        product: MLXLMTokenizers
      - package: swift-hf-api-mlx
        product: MLXLMHFAPI
      - package: ZIPFoundation
      - package: SwiftSoup
      - package: SwiftTerm
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.nextnote.app
        INFOPLIST_FILE: nextNote/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_NAME: NextNote
        INFOPLIST_KEY_CFBundleDisplayName: NextNote
        INFOPLIST_KEY_CFBundleName: NextNote
        INFOPLIST_KEY_NSHumanReadableCopyright: "Copyright © 2026 NextAgentBC. Licensed under the PolyForm Noncommercial License 1.0.0. Commercial use requires a separate license."
        MARKETING_VERSION: "0.3.0"
        CURRENT_PROJECT_VERSION: "7"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: false
        CODE_SIGN_ENTITLEMENTS: nextNote/nextNote.entitlements
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    entitlements:
      path: nextNote/nextNote.entitlements
      properties:
        # Sandbox OFF: nextNote spawns user-installed CLI tools (yt-dlp,
        # ffmpeg, ollama) from Homebrew paths. Requiring a NSOpenPanel
        # grant per binary on every fresh install was worse UX than the
        # containment was worth for a local notes app.
        com.apple.security.app-sandbox: false
        com.apple.security.network.client: true
